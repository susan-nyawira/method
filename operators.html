<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //operators are symbols used to perform operations on values or variables

        //Arithmetic operators-used for mathematical calculations
        let a =10
        let b =3
        console.log(a+b)
        console.log(a-b)
        console.log(a*b)
        console.log(a/b)
        console.log(a%b)//this means modulus or reminder
        console.log(a**b)//means a to the power of b (exponent)

        //comparison operators-they compare values and return true or false
        let x=8
        let y=10
        console.log(x>y)//greater than
        console.log(x<y)//less than
        console.log(x>=y)//greater than or equal to 
        console.log(x<=y)//less than or equal to
        console.log(x==y)//equal to
        console.log(x!=y)//not equal to

        //logical operators-used to combine conditions
        //AND operator(&&)-all conditions must be true
        let age=20
        let hasId=true
        console.log(age>=18 && hasId)

        //OR operator-atleast one condition must be true (||)
        let studentAge=16
        let hasParentPermission=true
        console.log(studentAge >=18 || hasParentPermission)

        //Increment and Decrement-they increase or decrease the value by one
        //increment
        let num=10
        num++
        console.log(num)

        //decrement
        let j=20
        j--
        console.log(j)

        //String operators-we use the + to combine strings
        let name= "John"
        console.log("Hello "+name)
    </script>
</body>
</html>
