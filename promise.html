<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //A promise is a js object that represent a value that will be available now, later or never
        //resolve-success
        //reject-failure, if the promise did not meet some qualification

        const myPromise=new Promise((resolve,reject)=>{
            const success=true
            if(success){
                resolve("promise resolved")
            }else{
                reject("promise rejected")
            }
        })
        myPromise
        .then((message)=>console.log(message))//runs if the promise is a success
        .catch((error)=>console.log(error))//runs if the promise is rejected/failed

        const checkExamScore=new Promise((resolve,reject)=>{
            const score=75
            if(score>=50){
                resolve("congratulations, you passed the eaxams")
            }else{
                reject("sorry you failed")
            }
        })

        checkExamScore
        .then((message)=>console.log(message))//runs if the promise is a success
        .catch((error)=>console.log(error))//runs if the promise is rejected/failed
    </script>
</body>
</html>
