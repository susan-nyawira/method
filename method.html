<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //String Methods
        let message="Hello World"

        // .length. returns the number of characters in a string
        console.log(message.length)

        //.toUpperCase()-converts text to uppercse
        console.log(message.toUpperCase())

        //.toLowerCase().converts text to Lowercase
        console.log(message.toLowerCase())

        //.includes().checks if a string contains certain text
        console.log(message.includes("Hello"))
        console.log(message.includes("Kenya"))

        //.replace()-replace part of a string
        console.log(message.replace("World","Kenya"))

        //Array Methods
        let products=["Laptop","phone","monitor"]
        console.log(products)

        //.push().adds a new item to end of the array
        products.push("keyboarbs")
        console.log(products)

        //.unshift().adds a new element to the start on an array
        products.unshift("headphones")
        console.log(products)

        //.pop().it removes the last item from the array
        products.pop()
        console.log(products)

       //.shift-removes the first item from the Array
        products.shifts()
        console.log(products)

        //includes()-checks if an array contains a value
        console.log(products.includes("phone"))

        //length-returns the number of the items in an array
        console.log(products.length)
    </script>
</body>
</html>
