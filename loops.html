<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //loops are used to repeat code multiple time instead of writing it again and again
        //there are are three kind of loops
        //for loop-used when you know how many times you want to run the code
        //for(initialization;condition;increament){}

        for(let i=1;i<=50;i++){
            console.log(i)
        }

        //while loop-used when you don't know how many times the loop will run
        let x=10
        while(x<=30){
            console.log(x)
            x++
        }
        //do .....while-runs at least once even if the condition is false
        let y=6
        do{
            console.log(y)
            y++
        }while(y<=12)

        //looping through an array
        let products=["Laptops","headphones","monitor"]
        console.log(products)
        for(let product of products){
            console.log(product)
        }

        //break-stops the loop early
        for(let a=1;a<=5;a++){
         if(a==3)break
         console.log(a)   
        }
        
        let numbers=[10,20,30,40,50]
        for(let num of numbers){
            if(num==30){
                console.log("found it")
                break
            }
        }

        //continue-skips one iteration
        let data=[10,-5,7,20,-6]
        for(let num of data){
            if(num<0)continue
            console.log(num)
        }
    </script>
    
</body>
</html>
